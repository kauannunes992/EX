<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste da Ex</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
        padding-top: 80px;
    }
    #box {
        border: 2px solid white;
        padding: 20px;
        display: inline-block;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 20px;
        min-width: 320px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
    }
    .sim { background: green; color: white; }
    .nao { background: red; color: white; }
    .final { background: crimson; font-weight: bold; }
</style>
</head>
<body>

<div id="box">Você realmente superou sua ex?</div>
<br>
<button class="sim" onclick="responder('sim')">Sim</button>
<button class="nao" onclick="responder('nao')">Não</button>

<script>
let estado = "inicio";

const fluxo = {
    inicio: {
        pergunta: "Você realmente superou sua ex?",
        sim: "pensar",
        nao: "saudade"
    },
    pensar: {
        pergunta: "Você ainda pensa nela às vezes?",
        sim: "saudade",
        nao: "curiosidade"
    },
    saudade: {
        pergunta: "Você sente falta de momentos com ela?",
        sim: "mensagem",
        nao: "comparacao"
    },
    curiosidade: {
        pergunta: "Você ficaria curioso se visse ela com outro?",
        sim: "comparacao",
        nao: "orgulho"
    },
    comparacao: {
        pergunta: "Você já comparou outra pessoa com ela?",
        sim: "mensagem",
        nao: "orgulho"
    },
    mensagem: {
        pergunta: "Se ela te chamasse agora, você responderia?",
        sim: "encontro",
        nao: "orgulho"
    },
    encontro: {
        pergunta: "Se vocês saíssem de novo, você iria?",
        sim: "sentimento",
        nao: "duvida"
    },
    sentimento: {
        pergunta: "Você acha que ainda sente algo por ela?",
        sim: "final_confissao",
        nao: "duvida"
    },
    curiosidade2: {
        pergunta: "Você nunca nem quis saber como ela tá?",
        sim: "orgulho",
        nao: "saudade"
    },
    orgulho: {
        pergunta: "Você não volta por orgulho?",
        sim: "quebra_orgulho",
        nao: "duvida"
    },
    quebra_orgulho: {
        pergunta: "Se o orgulho não existisse, você voltaria?",
        sim: "final_confissao",
        nao: "duvida"
    },
    duvida: {
        pergunta: "Então por que você ainda tá respondendo isso?",
        sim: "final_confissao",
        nao: "final_confissao"
    },
    final_confissao: {
        pergunta: "Admite… você ainda quer voltar pra sua ex 🤡"
    }
};

function responder(resposta) {
    if (estado === "final_confissao") return;

    estado = fluxo[estado][resposta];
    document.getElementById("box").innerText = fluxo[estado].pergunta;

    if (estado === "final_confissao") {
        document.getElementById("box").classList.add("final");
    }
}
</script>

</body>
</html>
